name: Java CI with Maven and Docker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Unit Tests
        run: mvn -B test

      - name: Build Jar (No tests)
        run: mvn -B package -DskipTests

      - name: Verify Docker Build
        run: docker build -t log-ingestion-engine:test .

      - name: Test Summary
        if: always()
        run: echo "CI Process finished successfully."
